
####################################
######     Global start     ######
####################################
name                : 'AINNO'
title               : 'AINNO – AI ir programinė įranga'
email               : info@ainno.io
address             : 'ainno.io '
phone               : 0000000000
tagline             : 'AI verslui'
description: >-
  AINNO – AI ir procesų automatizacija B2B: nuo nemokamos analizės ir MVP iki integracijos jūsų sistemose.
  MB AI Sprendimai, Vilnius. Sutaupykite laiką su AI sprendimais.
baseurl             : "" # the subpath of your site, e.g. /blog
url                 : "https://ainno.io"
locale              : lt_LT
lang                : lt
favicon: 'img/favicon.png'

paginate: 12
paginate_path: "/blog/page:num/"

sass:
    sass_dir: _sass
    style: compressed

# Build settings
markdown            : kramdown

# google_analytics
google_analytics: 

# disqus comment
disqus_shortname: softdash


####################################
######     Hero start     ######
####################################
# product_background_image          sass
# product_fixed_image               saas_video             
# product                           sass_background_image
# product_slider                    sass_fixed_image
# product_video                     sass_slider       

hero: 'product_fixed_image'

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - package.json
  - gulpfile.js

# Plugins (previously gems:)
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-redirect-from

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-redirect-from

####################################
######      Global end      ######
####################################


mailchimp:
  user-id: 
  list-id: 

####################################
######        Copyright       ######
####################################
company_url: 'https://ainno.io'


# SEO Related
google_site_verification :
bing_site_verification   :
yandex_site_verification :
naver_site_verification  :

# Social Sharing (SEO / Open Graph / JSON-LD)
twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : img/hero/hero-img.png
seo:
  logo                   : img/logo.png
  default_image_alt      : "AINNO – AI ir procesų automatizacija verslui"
  keywords               : "AI automatizacija, procesų optimizacija, MVP, B2B, Lietuva, programinė įranga, integracijos, AINNO, MB AI Sprendimai"
social:
  type                   : Organization
  name                   : MB AI Sprendimai
  links:
    - https://www.facebook.com/profile.php?id=61576525419173

# Analytics
analytics:
  provider               : false # false (default), "google", "google-universal", "custom"
  google:
    tracking_id          :
    anonymize_ip         : # true, false (default)

# timezone: '' # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

#google map api key

map: 
  key: 'AIzaSyA7nx22ZmINYk9TGiXDEXGVxghC43Ox6qA'
  let: 40.6700
  lng: -73.9400
  zoom: 11
  title: '121 King William Street, Snazzy'



# Collections
collections:
  posts:
    output: true
    permalink: /blog/:slug/
  pages:
    output: true
    permalink: /:path/index:output_ext

# Defaults
defaults:
  # _pages 
  - scope:
      path: "" # we can not defile path /blog/index.html for pagination
      type: pages
    values:
      layout: page
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      hero: blog_details
