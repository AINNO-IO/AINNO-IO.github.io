    <section id="kaip-dirbame" class="ainno-section">
        <div class="container ainno-container">
            <div class="row">
                <div class="col-lg-10">
                    <div class="ainno-section-heading">
                        <div class="ainno-section-heading-icon" aria-hidden="true"><i class="{{ site.data.execution.icon_class }}"></i></div>
                        <div>
                            <h2>{{ site.data.execution.title }}</h2>
                            <p class="section-lead mb-0">{{ site.data.execution.description }}</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                {% for proces in site.data.execution.process %}
                <div class="col-lg-6 mt-3">
                    <div class="ainno-card ainno-card-interactive h-100">
                        <div class="ainno-step">
                            <div class="ainno-step-num" aria-hidden="true">{{ forloop.index }}</div>
                            <div>
                                <h3>{{ proces.title }}</h3>
                                {% if proces.description %}
                                <p>{{ proces.description }}</p>
                                {% endif %}
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
