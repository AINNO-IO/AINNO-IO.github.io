<section class="ainno-section">
    <div class="container ainno-container">
        <div class="row">
            <div class="col-lg-10">
                <h1>{{ site.data.privacy_policy.title }}</h1>
                <p class="section-lead">{{ site.data.privacy_policy.lead }}</p>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-lg-12">
                {% for block in site.data.privacy_policy.sections %}
                <div class="ainno-card mt-3">
                    <div style="font-weight: 900; margin-bottom: 8px;">{{ block.heading }}</div>
                    <div style="color: #475569;">{{ block.body }}</div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>
