<section class="ainno-section">
    <div class="container ainno-container">
        <div class="row">
            <div class="col-lg-10">
                <h2>{{ site.data.stat.title }}</h2>
                <p class="section-lead mb-0">{{ site.data.stat.description }}</p>
            </div>
        </div>

        <div class="row mt-4">
            {% for item in site.data.stat.statistics %}
            <div class="col-lg-6 mt-3">
                <div class="ainno-card">
                    <div style="font-weight: 900; margin-bottom: 6px;">{{ item.title }}</div>
                    <div style="color: #475569;">{{ item.description }}</div>
                    <div class="mt-3">
                        <a class="ainno-btn ainno-btn-ghost" href="{{ item.link | relative_url }}">Toliau</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
