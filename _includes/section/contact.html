    <section id="contact" class="ainno-section ainno-contact">
        <div class="container ainno-container">
            <div class="row align-items-start">
                <div class="col-lg-5">
                    <div class="ainno-section-heading mb-3">
                        <div class="ainno-section-heading-icon" aria-hidden="true"><i class="{{ site.data.contact.icon_class }}"></i></div>
                        <div>
                            <h2>{{ site.data.contact.title }}</h2>
                            <p class="section-lead mb-0">{{ site.data.contact.description }}</p>
                        </div>
                    </div>
                    <div class="ainno-card mt-3 ainno-contact-sidebar-card">
                        <p class="ainno-contact-sidebar-note mb-0">{{ site.data.contact.sidebar_note }}</p>
                    </div>
                </div>

                <div class="col-lg-7 mt-4 mt-lg-0">
                    <div class="ainno-card">
                        <form class="ainno-form" action="https://api.web3forms.com/submit" method="POST">
                            <input type="hidden" name="access_key" value="{{ site.data.contact.web3forms_access_key }}">
                            <input type="hidden" name="subject" value="{{ site.data.contact.web3forms_subject }}">
                            {% if site.data.contact.web3forms_redirect != blank %}
                            <input type="hidden" name="redirect" value="{{ site.data.contact.web3forms_redirect }}">
                            {% endif %}
                            <div class="form-group">
                                <label for="contact-company">Įmonės pavadinimas</label>
                                <input id="contact-company" name="company" autocomplete="organization" class="form-control" type="text"
                                    placeholder="Įmonės pavadinimas" required>
                            </div>
                            <div class="form-group">
                                <label for="contact-employees">Kiek darbuotojų?</label>
                                <select id="contact-employees" name="employees" class="form-control" required>
                                    <option value="" selected disabled>Pasirinkite</option>
                                    {% for opt in site.data.contact.employee_options %}
                                    <option value="{{ opt.value }}">{{ opt.label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="contact-email">El. paštas</label>
                                <input id="contact-email" name="email" autocomplete="email" class="form-control" required type="email"
                                    placeholder="jusu@imone.lt"
                                    pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{1,63}$">
                            </div>
                            <div class="form-group">
                                <label for="contact-message">Žinutė</label>
                                <textarea id="contact-message" class="form-control" cols="30" rows="5" name="message" autocomplete="off" required
                                    placeholder="Aprašykite procesą, kurį norite automatizuoti"></textarea>
                            </div>
                            <button type="submit" class="ainno-btn ainno-btn-primary ainno-btn-lg ainno-form-submit">Siųsti užklausą</button>
                            <p class="ainno-form-trust mt-3 mb-0">{{ site.data.contact.form_trust }}</p>
                            <div class="alert-msg mt-3"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
