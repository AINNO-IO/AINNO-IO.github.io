<section class="ainno-section">
    <div class="container ainno-container">
        <div class="row">
            <div class="col-lg-10">
                <h2>Paslaugos</h2>
                <p class="section-lead mb-0">AI, integracijos, low-code – pagal jūsų poreikius.</p>
            </div>
        </div>

        <div class="row mt-4">
            {% for feature in site.data.feature %}
            <div class="col-lg-4 mt-3">
                <div class="ainno-card">
                    <div style="font-weight: 900; margin-bottom: 8px;">{{ feature.title }}</div>
                    <div style="color: #475569;">{{ feature.description }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
