title: 'Privatumo politika'
lead: 'Trumpai apie tai, kaip tvarkome jūsų duomenis, kai naudojatės ainno.io.'

sections:
  - heading: 'Valdytojas'
    body: 'MB AI Sprendimai (prekės ženklas AINNO). Klausimai: info@ainno.io.'
  - heading: 'Kokius duomenis renkame'
    body: 'Kontaktų formoje: vardas, telefono numeris, el. paštas, žinutės turinys – kad atsakytume į užklausą ir pasiūlytume analizę / MVP.'
  - heading: 'Teisinis pagrindas'
    body: 'Tvarkome duomenis siekdami atsakyti į užklausą ir vykdyti prieškontraktinius veiksmus (BDAR 6 str. 1 d. b punktas) bei teisėtas verslo interesas palaikyti ryšį.'
  - heading: 'Saugojimas'
    body: 'Užklausas saugome tiek, kiek reikia komunikacijai ir projektų administravimui, ne ilgiau nei būtina, nebent įstatymai numato kitaip.'
  - heading: 'Jūsų teisės'
    body: 'Turite teisę susipažinti su duomenimis, reikalauti pataisymo ar ištrynimo, apriboti tvarkymą, nesutikti su tvarkymu, teikti skundą priežiūros institucijai. Kreipkitės info@ainno.io.'
  - heading: 'Pakeitimai'
    body: 'Politiką galime atnaujinti. Data nurodyta puslapio pabaigoje arba versijos pastaba.'
